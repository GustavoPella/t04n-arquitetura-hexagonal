spring.datasource.url=jdbc:h2:mem:arq_software
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.sql.init.mode=always

# Credenciais AWS Dinâmicas
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
spring.cloud.aws.region.static=us-east-1
aws.sqs.queue.saida-estoque=SQS_SAIDA_ESTOQUE.fifo
aws.sqs.queue.entrada-estoque=SQS_ENTRADA_ESTOQUE.fifo
aws.sqs.queue.order-events=T04N_GUSTAVO_PELLA_BAZANELLA.fifo